# Railway / Nixpacks: bind 0.0.0.0:$PORT and route all requests through public/server.php (Laravel front controller).
# Do not use `php -S -t public` without a router — Laravel routes will 404.
# https://docs.railway.com/

[phases.build]
cmds = ["npm install", "npm run build"]

[start]
cmd = "cd public && php -S 0.0.0.0:$PORT server.php"
